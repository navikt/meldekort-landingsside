apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: {{app}}
  namespace: meldekort
  labels:
    team: meldekort
spec:
  image: {{image}}
  port: 3000
  liveness:
    path: {{basePath}}/internal/health
    initialDelay: 10
  readiness:
    path: {{basePath}}/internal/ready
    initialDelay: 10
  replicas:
    min: {{replicas.min}}
    max: {{replicas.max}}
    cpuThresholdPercentage: 50
  resources:
    limits:
      memory: {{resources.limits.memory}}
    requests:
      cpu: {{resources.requests.cpu}}
      memory: {{resources.requests.memory}}
  ingresses:
  {{#each ingresses as |url|}}
     - {{url}}
  {{/each}}
  idporten:
    enabled: {{idporten.enabled}}
    sidecar:
      enabled: {{idporten.enabled}}
      level: {{idporten.level}}
      autoLogin: {{idporten.autoLogin}}
  tokenx:
    enabled: {{idporten.enabled}}
  accessPolicy:
    outbound:
      rules:
        - application: nav-dekoratoren
          namespace: personbruker
        - application: meldekort-api
          namespace: meldekort
        - application: tiltakspenger-meldekort-api
          namespace: tpts
        - application: dp-meldekortregister
          namespace: teamdagpenger
        - application: meldekort-backend
          namespace: aap
      external:
        - host: dekoratoren.ekstern.dev.nav.no
        - host: www.nav.no
        - host: rt6o382n.api.sanity.io
        - host: rt6o382n.apicdn.sanity.io
  env:
    - name: NODE_ENV
      value: production
    - name: HOST
      value: "0.0.0.0"
    - name: PORT
      value: "3000"
    - name: ENFORCE_LOGIN
      value: "{{enforce_login}}"
    - name: MELDEKORT_API_URL
      value: "{{meldekortApiUrl}}"
    - name: MELDEKORT_API_AUDIENCE
      value: "{{meldekortApiAudience}}"
    - name: TILTAKSPENGER_API_URL
      value: "{{tiltakspengerApiUrl}}"
    - name: TILTAKSPENGER_API_AUDIENCE
      value: "{{tiltakspengerApiAudience}}"
    - name: DP_API_URL
      value: "{{dpApiUrl}}"
    - name: DP_API_AUDIENCE
      value: "{{dpApiAudience}}"
    - name: AAP_API_URL
      value: "{{aapApiUrl}}"
    - name: AAP_API_AUDIENCE
      value: "{{aapApiAudience}}"
